name: Telegram Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: R un bot
      env:
        API=8609742763:AAGPNOY5xwCmUjRnN-SwjHehDJ_1Lbu3i64

        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        python ASADBEK.py
